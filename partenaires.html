    <style>
        :root {
            --lime: #D9FF00;
            --cyan: #37D5D6;
            --magenta: #B227B2;
            --cream: #FBFBFD;
            --zinc-900: #18181b;
            --zinc-700: #3f3f46;
            --zinc-500: #71717a;
            --zinc-400: #a1a1aa;
            --zinc-200: #e4e4e7;
            --zinc-100: #f4f4f5;
            --cubic: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Geist', system-ui, sans-serif;
            background: var(--cream);
            color: var(--zinc-900);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ── PROGRESS BAR ── */
        .progress-bar {
            height: 3px;
            background: linear-gradient(90deg, #D9FF00, #37D5D6, #B227B2);
            position: fixed;
            top: 0; left: 0;
            z-index: 9999;
            transition: width 0.15s ease;
            box-shadow: 0 0 8px rgba(217,255,0,0.4);
        }

        /* ── NAV ── */
        nav {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--zinc-100);
        }

        .nav-link {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--zinc-500);
            padding: 0.375rem 0.625rem;
            letter-spacing: 0.01em;
            white-space: nowrap;
            position: relative;
            transition: color 0.2s ease;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -1px; left: 0; right: 0;
            height: 2px;
            background: var(--lime);
            transform: scaleX(0);
            transition: transform 0.2s ease;
        }
        .nav-link:hover { color: var(--zinc-900); }
        .nav-link:hover::after, .nav-link.active::after { transform: scaleX(1); }
        .nav-link.active { color: var(--zinc-900); font-weight: 600; }

        /* ── SECTION SPACING ── */
        .section-spacing { padding-top: 7rem; padding-bottom: 7rem; }
        @media (max-width: 768px) { .section-spacing { padding-top: 4rem; padding-bottom: 4rem; } }

        /* ── BENTO CARD ── */
        .bento {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgb(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.04);
            position: relative;
            overflow: hidden;
            transition: box-shadow 0.3s var(--cubic), transform 0.3s var(--cubic);
        }
        .bento:hover {
            box-shadow: 0 16px 48px rgb(0,0,0,0.08);
            transform: translateY(-2px);
        }
        .bento-accent {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
        }
        .accent-lime { background: var(--lime); }
        .accent-cyan { background: var(--cyan); }
        .accent-magenta { background: var(--magenta); }

        /* ── SECTION LABEL ── */
        .section-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--zinc-400);
            font-family: 'Geist', sans-serif;
        }

        /* ── HERO ── */
        .hero-bg {
            position: absolute;
            inset: 0;
            background: #000;
        }
        .hero-bg video, .hero-bg img.hero-img {
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.35;
        }
        .hero-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.5) 100%);
        }

        /* ── COUNTER ANIMATION ── */
        .counter { font-variant-numeric: tabular-nums; }

        /* ── SEPARATOR ── */
        .sep {
            height: 1px;
            background: var(--zinc-100);
        }

        /* ── KPI CARD ── */
        .kpi-card {
            background: #fff;
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 2px 12px rgb(0,0,0,0.06);
            border: 1px solid rgba(0,0,0,0.04);
            transition: all 0.3s var(--cubic);
        }
        .kpi-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgb(0,0,0,0.1); }

        /* ── TAG ── */
        .tag {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.25rem 0.75rem;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .tag-lime { background: rgba(217,255,0,0.15); color: #5a6600; }
        .tag-cyan { background: rgba(55,213,214,0.12); color: #0a7a7b; }
        .tag-magenta { background: rgba(178,39,178,0.1); color: #7a0a7a; }
        .tag-green { background: rgba(34,197,94,0.12); color: #15803d; }

        /* ── CITATION ── */
        .citation {
            border-left: 3px solid var(--cyan);
            padding-left: 1.25rem;
            font-style: italic;
            color: var(--zinc-500);
            line-height: 1.75;
        }

        /* ── CHECKLIST ── */
        .checklist li {
            display: flex;
            gap: 0.625rem;
            padding: 0.5rem 0;
            font-size: 0.8rem;
            color: var(--zinc-700);
            border-bottom: 1px solid var(--zinc-100);
            align-items: flex-start;
            line-height: 1.5;
        }
        .checklist li:last-child { border-bottom: none; }
        .check-icon { color: var(--lime); font-size: 0.75rem; margin-top: 2px; flex-shrink: 0; filter: brightness(0.6); }
        .star-icon { color: var(--cyan); font-size: 0.75rem; margin-top: 2px; flex-shrink: 0; }

        /* ── LOGO GRID ── */
        .logo-item {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem 1.25rem;
            background: #fff;
            border-radius: 12px;
            border: 1px solid var(--zinc-100);
            box-shadow: 0 2px 8px rgb(0,0,0,0.04);
            filter: grayscale(100%) opacity(0.6);
            transition: all 0.3s var(--cubic);
            cursor: pointer;
            position: relative;
        }
        .logo-item:hover {
            filter: grayscale(0%) opacity(1);
            box-shadow: 0 8px 24px rgb(0,0,0,0.1);
            transform: translateY(-2px);
            border-color: var(--zinc-200);
        }
        .logo-item img {
            max-height: 36px;
            max-width: 110px;
            object-fit: contain;
        }
        .logo-item-major img { max-height: 48px; max-width: 140px; }

        /* Partner popup */
        .partner-popup {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .partner-popup.open { display: flex; }
        .partner-popup-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
        }
        .partner-popup-content {
            position: relative;
            background: #fff;
            border-radius: 20px;
            padding: 2rem;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 24px 80px rgb(0,0,0,0.2);
            z-index: 1;
        }

        /* ── PRESSE CARD ── */
        .presse-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            object-position: top;
            border-radius: 12px 12px 0 0;
            transition: transform 0.3s ease;
        }
        .presse-card:hover img { transform: scale(1.02); }

        /* ── PRICING CARD ── */
        .pricing-card {
            background: #fff;
            border-radius: 20px;
            border: 1.5px solid var(--zinc-200);
            padding: 2rem;
            position: relative;
            transition: all 0.3s var(--cubic);
        }
        .pricing-card:hover { border-color: var(--zinc-400); box-shadow: 0 16px 48px rgb(0,0,0,0.08); }
        .pricing-card.featured {
            border-color: var(--zinc-900);
            box-shadow: 0 16px 48px rgb(0,0,0,0.12);
        }
        .pricing-card.featured:hover { box-shadow: 0 24px 64px rgb(0,0,0,0.16); }
        .pricing-badge {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--zinc-900);
            color: #fff;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 0.25rem 1rem;
            border-radius: 100px;
            white-space: nowrap;
        }
        .pricing-level-includes {
            background: var(--zinc-100);
            border-radius: 8px;
            padding: 0.5rem 0.75rem;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--zinc-700);
            letter-spacing: 0.03em;
            margin-bottom: 0.75rem;
        }

        /* ── FORM ── */
        .form-input {
            width: 100%;
            background: var(--cream);
            border: 1.5px solid var(--zinc-200);
            border-radius: 10px;
            color: var(--zinc-900);
            padding: 0.75rem 1rem;
            font-family: 'Geist', sans-serif;
            font-size: 0.875rem;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            outline: none;
        }
        .form-input:focus {
            border-color: var(--zinc-900);
            box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
        }
        .form-input::placeholder { color: var(--zinc-400); }
        select.form-input { cursor: pointer; }

        /* ── BUTTONS ── */
        .btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background: var(--zinc-900);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 0.875rem 2rem;
            font-family: 'Geist', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }
        .btn-primary:hover { background: #000; transform: translateY(-1px); box-shadow: 0 8px 24px rgb(0,0,0,0.2); }

        .btn-lime {
            background: var(--lime);
            color: #000;
        }
        .btn-lime:hover { background: #c8ee00; box-shadow: 0 8px 24px rgba(217,255,0,0.3); }

        .btn-whatsapp {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
